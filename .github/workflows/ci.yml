name: Admin Frontend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: admin-frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      # We intentionally use ESLint directly because `next lint` can be unstable
      # in some CI environments with specific native dependencies.
      - name: Run Lint
        run: npx eslint src

      - name: Build Next App
        run: npm run build

  vercel-note:
    name: Vercel Deployment Mode
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deployment info
        run: |
          echo "This repository is configured for Vercel Git Integration deployments."
          echo "No SSH/VPS deployment is executed from GitHub Actions."
          echo "After CI passes, Vercel will automatically build/deploy from main."
