name: Admin Frontend CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: admin-frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      # We intentionally use ESLint directly because `next lint` can be unstable
      # in some CI environments with specific native dependencies.
      - name: Run Lint
        run: npx eslint src

      - name: Build Next App
        run: npm run build
